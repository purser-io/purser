# Release pipeline (runs on version tags): build + push all three images to
# GHCR multi-arch, generate CycloneDX SBOMs, gate on vulnerabilities, then
# keyless-sign + attest (SLSA provenance + SBOM) each image by digest; build the
# PyPI sdist+wheel (and publish via Trusted Publishing when opted in); and cut a
# GitHub Release carrying the SBOMs, THIRD_PARTY_LICENSES, chart, and dists.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag/ref to build"
        required: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  images:
    name: build ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push to GHCR
      id-token: write         # cosign keyless + provenance attestation
      attestations: write     # actions/attest-build-provenance
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: core, file: Dockerfile,      suffix: "",      lock: requirements.lock }
          - { name: hf,   file: Dockerfile.hf,   suffix: "-hf",   lock: requirements-hf.lock }
          - { name: deep, file: Dockerfile.deep, suffix: "-deep", lock: requirements-deep.lock }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push (amd64 + arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Set image ref
        id: ref
        run: echo "image=${REGISTRY}/${GH_REPO}${SUFFIX}" >> "$GITHUB_OUTPUT"
        env:
          GH_REPO: ${{ github.repository }}
          SUFFIX: ${{ matrix.suffix }}

      # --- SBOM (CycloneDX, license-aware) from the hash-pinned lockfile ---
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      - name: Install extras for license resolution
        run: |
          uv venv --clear
          uv pip install -e ".[dev,sign,hf,deep]"
      - name: Generate CycloneDX SBOM
        run: |
          mkdir -p sbom
          uv run python scripts/gen_sbom.py "${{ matrix.lock }}" \
            "sbom/purser-${{ matrix.name }}.cdx.json" \
            --name "purser${{ matrix.suffix }}" --version "${GITHUB_REF_NAME#v}"

      # --- Vulnerability gate: never sign a vulnerable image ---
      - name: Trivy scan (HIGH/CRITICAL, fixed only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.ref.outputs.image }}@${{ steps.build.outputs.digest }}
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: OSV scan of SBOM deps (advisory)
        continue-on-error: true
        run: |
          docker run --rm -v "${{ github.workspace }}:/w" \
            ${{ env.REGISTRY }}/google/osv-scanner:latest \
            scan --sbom="/w/sbom/purser-${{ matrix.name }}.cdx.json"

      # --- Sign + attest by digest (keyless via Fulcio/Rekor) ---
      # Wrapped in a retry: the public Fulcio/Rekor endpoints occasionally reset
      # the connection, and a transient blip shouldn't fail a whole release.
      - uses: sigstore/cosign-installer@v3
      - name: Cosign sign + attest SBOM
        run: |
          retry(){ local n=1; until "$@"; do [ $n -ge 4 ] && { echo "::error::$* failed after 4 attempts"; return 1; }; echo "attempt $n failed; retrying in $((n*10))s..."; sleep $((n*10)); n=$((n+1)); done; }
          retry cosign sign --yes "${IMAGE}@${DIGEST}"
          retry cosign attest --yes --type cyclonedx \
            --predicate "sbom/purser-${{ matrix.name }}.cdx.json" "${IMAGE}@${DIGEST}"
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
      # GitHub-native attestation needs a paid plan or a public repo. The cosign
      # sign + SBOM attest steps above already provide Sigstore-backed signatures
      # and provenance (in-registry + Rekor), so this is a redundant extra that
      # activates automatically if the repo is ever made public.
      - name: SLSA build provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.ref.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom/purser-${{ matrix.name }}.cdx.json

  chart:
    name: publish Helm chart
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push chart to GHCR (OCI)
      id-token: write         # cosign keyless
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: sigstore/cosign-installer@v3
      # cosign reads Docker's config for registry auth; helm registry login
      # writes its own, so log in with both.
      - name: Log in to GHCR (Docker, for cosign)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Stamp the chart version + appVersion from the tag (no in-repo edit).
      - name: Package chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          mkdir -p dist
          helm package deploy/helm/purser \
            --version "$VERSION" --app-version "$VERSION" -d dist
      - name: Log in to GHCR (Helm registry)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push chart (OCI) and cosign-sign
        run: |
          retry(){ local n=1; until "$@"; do [ $n -ge 4 ] && { echo "::error::$* failed after 4 attempts"; return 1; }; echo "attempt $n failed; retrying in $((n*10))s..."; sleep $((n*10)); n=$((n+1)); done; }
          out=$(retry helm push "dist/purser-${VERSION}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts" 2>&1)
          echo "$out"
          digest=$(echo "$out" | awk -F': ' '/Digest:/ {print $2}')
          test -n "$digest" || { echo "::error::could not parse chart digest"; exit 1; }
          # Retry cosign: the public Fulcio/Rekor endpoints occasionally reset
          # the connection, and a transient blip shouldn't fail the release.
          retry cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/charts/purser@${digest}"
      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: chart
          path: dist/*.tgz

  pydist:
    name: build PyPI distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      # sdist + wheel via the hatchling backend (isolated build env).
      - name: Build sdist + wheel
        run: uv build --sdist --wheel --out-dir dist
      - name: Validate package metadata
        run: uvx twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: pydist
          path: dist/*

  pypi-publish:
    name: publish to PyPI
    needs: pydist
    # Publishes only once you opt in (repo variable PUBLISH_PYPI=true) AND a PyPI
    # Trusted Publisher is configured for this repo + workflow + environment
    # "pypi". Until then the sdist/wheel are still built and attached to the
    # GitHub Release by the `pydist`/`release` jobs.
    if: vars.PUBLISH_PYPI == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/purser
    permissions:
      id-token: write        # PyPI Trusted Publishing (OIDC) — no API token
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: pydist
          path: dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # tolerate an already-uploaded placeholder version

  release:
    name: publish GitHub Release
    needs: [images, chart, pydist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Collect SBOMs
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          path: sbom
          merge-multiple: true
      - name: Collect chart
        uses: actions/download-artifact@v4
        with:
          name: chart
          path: dist
      - name: Collect PyPI distributions
        uses: actions/download-artifact@v4
        with:
          name: pydist
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sbom/*.cdx.json
            THIRD_PARTY_LICENSES.md
            dist/*.tgz
            dist/*.whl
            dist/*.tar.gz
