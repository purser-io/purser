# Blocks PRs that introduce dependencies with known vulnerabilities or
# disallowed (copyleft) licenses — Purser ships permissive-only.
name: Dependency review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    # The dependency-review API requires the dependency graph, which on private
    # repos needs GitHub Advanced Security. Dormant until the repo is public.
    if: github.event.repository.visibility == 'public'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-3.0
