# Static analysis of the Python source with GitHub CodeQL (security-extended).
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 2"   # Tuesdays 03:00 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (python)
    runs-on: ubuntu-latest
    # Code scanning upload needs GitHub Advanced Security, which isn't available
    # on private repos. Stay dormant until the repo is public (skipped != failed).
    if: github.event.repository.visibility == 'public'
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
