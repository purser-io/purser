# ModelGuard CI: test -> reproducible build -> vuln scan -> keyless signing.
stages: [test, build, scan, sign]

variables:
  IMAGE: "$CI_REGISTRY_IMAGE"
  TAG: "$CI_COMMIT_SHORT_SHA"

test:
  stage: test
  image: python:3.14-slim
  before_script:
    - pip install uv
    - uv pip install --system -e ".[dev,sign]"
  script:
    - ruff check src tests
    - pytest -q
    # Supply-chain gate: fail the pipeline if lockfiles drift from pyproject.
    - make lock-verify

build:
  stage: build
  image: docker:27
  services: [docker:27-dind]
  before_script:
    - apk add --no-cache python3 make
    - docker run --privileged --rm tonistiigi/binfmt --install all   # QEMU for multi-arch
    - docker buildx create --use --name mg
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Multi-arch (amd64+arm64) with SLSA provenance + SBOM attestations baked
    # in by buildx.
    - docker buildx build --platform linux/amd64,linux/arm64
        --provenance=true --sbom=true --push -t "$IMAGE:$TAG" -f Dockerfile .
    - docker buildx build --platform linux/amd64,linux/arm64
        --provenance=true --sbom=true --push -t "$IMAGE-hf:$TAG" -f Dockerfile.hf .
    # Standalone CycloneDX SBOM artifacts (used by scan:deps and cosign attest).
    - python3 scripts/gen_sbom.py requirements.lock sbom/purser-core.cdx.json --version "$TAG"
    - python3 scripts/gen_sbom.py requirements-hf.lock sbom/purser-hf.cdx.json --name purser-hf --version "$TAG"
  artifacts:
    paths: [sbom/]
    expire_in: 90 days

# Vulnerability gate: fail on HIGH/CRITICAL in the image, and scan the SBOM's
# dependencies against the OSV database. Runs before signing so a vulnerable
# build is never signed/released.
scan:image:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed "$IMAGE:$TAG"
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed "$IMAGE-hf:$TAG"
  allow_failure: false

scan:deps:
  stage: scan
  image:
    name: ghcr.io/google/osv-scanner:latest
    entrypoint: [""]
  script:
    - osv-scanner scan --sbom sbom/purser-core.cdx.json
    - osv-scanner scan --sbom sbom/purser-hf.cdx.json
  allow_failure: true          # advisory until a baseline is triaged

sign:
  stage: sign
  image: alpine:3.20
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  before_script:
    - apk add --no-cache cosign docker-cli
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Keyless (Fulcio/Rekor) signatures + CycloneDX SBOM attestations.
    - cosign sign --yes "$IMAGE:$TAG"
    - cosign sign --yes "$IMAGE-hf:$TAG"
    - cosign attest --yes --type cyclonedx --predicate sbom/purser-core.cdx.json "$IMAGE:$TAG"
    - cosign attest --yes --type cyclonedx --predicate sbom/purser-hf.cdx.json "$IMAGE-hf:$TAG"
  rules:
    - if: $CI_COMMIT_TAG          # only sign released tags
