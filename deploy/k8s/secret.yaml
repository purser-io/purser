# API key for the /v1 endpoints. REPLACE the value before applying, or create
# the secret out-of-band:
#   kubectl -n purser create secret generic purser-auth \
#     --from-literal=api-key="$(openssl rand -hex 32)"
apiVersion: v1
kind: Secret
metadata:
  name: purser-auth
  namespace: purser
type: Opaque
stringData:
  api-key: "CHANGE-ME-generate-a-random-key"
