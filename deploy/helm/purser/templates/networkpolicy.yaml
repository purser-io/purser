{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "purser.fullname" . }}
  labels:
    {{- include "purser.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "purser.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- toYaml .Values.networkPolicy.allowFrom | nindent 8 }}
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # DNS resolution
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
